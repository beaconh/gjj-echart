<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>还款明细图表</title>
  <link rel="stylesheet" href="./utils/elementplus@2.14.3.css" />
  <link rel="stylesheet" href="./assets/app.css" />
  <script src="./utils/vue@v3.5.40.min.js"></script>
  <script src="./utils/elementplus@2.14.3.js"></script>
  <script src="./utils/elementplus-zh-cn@2.14.3.js"></script>
  <script src="./utils/echarts.min.js"></script>
  <script src="./assets/lineChart.js"></script>
  <script src="./assets/config.js"></script>
  <script src="./assets/jsonbin.js"></script>
  <script src="./assets/supabase.js"></script>
</head>
<body>
  <div id="app">
    <div v-if="error" class="error">
      <p>{{ error }}</p>
      <p v-if="configHint" class="error-hint">{{ configHint }}</p>
    </div>
    <div v-else-if="!ready" class="loading">正在加载数据…</div>
    <template v-else>
      <header>
        <div class="header-row">
          <h1>还款明细图表</h1>
          <span class="data-source" :class="useCloud ? 'cloud' : 'local'">
            {{ cloudLabel }}
          </span>
        </div>
        <p>共 {{ list.length }} 期 · {{ list[0].date }} 至 {{ list[list.length - 1].date }}</p>
      </header>

      <section class="overview">
        <div class="overview-panel paid">
          <h3>已还概况</h3>
          <div class="hero-metric">
            <span class="label">累计还款</span>
            <span class="value">{{ fmt(sum.total) }}</span>
          </div>
          <div class="paid-mix">
            <div class="bar">
              <span class="seg principal" :style="{ width: paidStats.principalPct + '%' }"></span>
              <span class="seg interest" :style="{ width: paidStats.interestPct + '%' }"></span>
              <span class="seg penalty" :style="{ width: paidStats.penaltyPct + '%' }"></span>
            </div>
            <div class="meta">
              <span class="principal">本金 {{ paidStats.principalPct }}%</span>
              <span class="interest">利息 {{ paidStats.interestPct }}%</span>
              <span class="penalty">罚息 {{ paidStats.penaltyPct }}%</span>
            </div>
          </div>
          <div class="metric-row">
            <div class="metric principal">
              <span class="k">本金</span>
              <span class="v">{{ fmt(sum.principal) }}</span>
            </div>
            <div class="metric interest">
              <span class="k">利息</span>
              <span class="v">{{ fmt(sum.interest) }}</span>
            </div>
            <div class="metric penalty">
              <span class="k">罚息</span>
              <span class="v">{{ fmt(sum.penalty) }}</span>
            </div>
          </div>
          <div class="metric-row four paid-extra">
            <div class="metric muted">
              <span class="k">已还期数</span>
              <span class="v">{{ paidStats.periods }} 期</span>
            </div>
            <div class="metric muted">
              <span class="k">平均每期</span>
              <span class="v">{{ fmt(paidStats.avgTotal) }}</span>
            </div>
            <div class="metric interest">
              <span class="k">利息占比</span>
              <span class="v">{{ paidStats.interestPct }}%</span>
            </div>
            <div class="metric muted">
              <span class="k">还款跨度</span>
              <span class="v">{{ paidStats.spanText }}</span>
            </div>
          </div>
          <p class="forecast-note">
            {{ paidStats.rangeText }} · 共 {{ paidStats.records }} 条明细
          </p>
        </div>

        <div class="overview-panel debt">
          <h3>剩余与测算</h3>
          <div class="hero-metric">
            <span class="label">还欠银行（剩余本金）</span>
            <span class="value">{{ fmt(remainPrincipal) }}</span>
          </div>
          <div class="loan-progress">
            <div class="bar"><span :style="{ width: loanProgress + '%' }"></span></div>
            <div class="meta">
              <span>原贷 {{ fmt(loanPrincipal) }}</span>
              <span>已还本金 {{ loanProgress }}%</span>
            </div>
          </div>
          <div class="metric-row four">
            <div class="metric muted">
              <span class="k">测算利率</span>
              <span class="v">{{ forecast.rate }}%</span>
            </div>
            <div class="metric muted metric-link" @click="openScheduleDialog">
              <span class="k">剩余期数</span>
              <span class="v">{{ forecast.periods }} 期</span>
              <span class="hint">点击查看待还款明细</span>
            </div>
            <div class="metric interest">
              <span class="k">预计剩余利息</span>
              <span class="v">{{ fmt(forecast.interest) }}</span>
            </div>
            <div class="metric total">
              <span class="k">预计还要还</span>
              <span class="v">{{ fmt(forecast.total) }}</span>
            </div>
          </div>
          <p class="forecast-note">
            等额本金 · 年利率 {{ forecast.rate }}% · 到期 {{ forecast.maturity }} · 月供本金约 {{ fmt(forecast.monthlyPrincipal) }}；未含提前还款或利率再调整。
          </p>
        </div>
      </section>

      <section class="charts">
        <div class="chart-panel">
          <h2>
            <span class="title-full">每期还款合计（本金 + 利息 + 罚息）· 叠加利率</span>
            <span class="title-short">每期还款合计</span>
          </h2>
          <div ref="stackChart" class="chart"></div>
        </div>

        <div class="chart-panel">
          <h2>
            <span class="title-full">按年汇总（本金 / 利息 / 罚息）· 点击年份可定位到上图</span>
            <span class="title-short">按年汇总 · 点击定位</span>
          </h2>
          <div ref="yearChart" class="chart short"></div>
        </div>

        <div class="row-2">
          <div class="chart-panel">
            <h2>
              <span class="title-full">每期还款总额走势 · 叠加利率</span>
              <span class="title-short">还款总额走势</span>
            </h2>
            <div ref="lineChart" class="chart short"></div>
          </div>
          <div class="chart-panel">
            <h2>累计金额占比</h2>
            <div ref="pieChart" class="chart short"></div>
          </div>
        </div>
      </section>

      <section class="list-panel">
        <div class="list-header">
          <h2>还款明细列表</h2>
          <div class="list-actions">
            <el-button type="primary" @click="openAddDialog">添加数据</el-button>
            <el-button v-if="useCloud" :loading="saving" @click="saveToCloud">保存到云端</el-button>
            <el-button @click="printAllData">导出全部 JSON</el-button>
            <el-button v-if="!useCloud" @click="printAddedData">导出新增 JSON</el-button>
          </div>
        </div>
        <p class="hint">
          <template v-if="cloudProvider === 'supabase'">
            数据存于 Supabase；增删改按条同步。也可点「保存到云端」整表覆盖。
          </template>
          <template v-else-if="cloudProvider === 'jsonbin'">
            数据存于 JSONBin；增删改后会自动同步。也可点「保存到云端」手动再存一次。
          </template>
          <template v-else>
            同一期多条已合并显示合计；带「N条合计」标记的可展开查看明细。本次新增的数据支持编辑和删除。配置 Supabase 后可云端持久化（见 README）。
          </template>
        </p>

        <!-- 桌面端表格：可视宽度 >= 640 -->
        <div v-if="!isMobile" class="table-wrap">
          <el-table
            :data="tableList"
            :height="tableHeight"
            row-key="period"
            :row-class-name="tableRowClass"
            stripe
          >
            <el-table-column type="expand" width="48">
              <template #default="{ row }">
                <div v-if="row.count > 1" class="detail-expand">
                  <el-table :data="row.items" size="small" border>
                    <el-table-column
                      type="index"
                      label="明细"
                      width="72"
                      :index="(i) => `${i + 1}/${row.count}`"
                    ></el-table-column>
                    <el-table-column prop="date" label="日期" min-width="110"></el-table-column>
                    <el-table-column label="利率" width="90">
                      <template #default="{ row: item }">
                        <span class="num-rate">{{ fmtRate(rowRate(item)) }}</span>
                      </template>
                    </el-table-column>
                    <el-table-column label="本金" min-width="110" align="right">
                      <template #default="{ row: item }">{{ fmt(item.principal) }}</template>
                    </el-table-column>
                    <el-table-column label="利息" min-width="110" align="right">
                      <template #default="{ row: item }">{{ fmt(item.interest) }}</template>
                    </el-table-column>
                    <el-table-column label="罚息" min-width="100" align="right">
                      <template #default="{ row: item }">{{ fmt(item.penalty) }}</template>
                    </el-table-column>
                    <el-table-column label="合计" min-width="110" align="right">
                      <template #default="{ row: item }">{{ fmt(item.total) }}</template>
                    </el-table-column>
                    <el-table-column label="操作" width="130" fixed="right">
                      <template #default="{ row: item }">
                        <template v-if="canEditItem(item)">
                          <el-button link type="primary" @click="openEditDialog(item)">编辑</el-button>
                          <el-button link type="danger" @click="deleteItem(item)">删除</el-button>
                        </template>
                        <span v-else class="op-muted">—</span>
                      </template>
                    </el-table-column>
                  </el-table>
                </div>
              </template>
            </el-table-column>
            <el-table-column label="期数" min-width="120">
              <template #default="{ row }">
                <strong>第{{ row.period }}期</strong>
                <span v-if="isAddedPeriod(row)" class="badge added">新增</span>
              </template>
            </el-table-column>
            <el-table-column label="合并" width="110">
              <template #default="{ row }">
                <span class="badge" :class="{ single: row.count <= 1 }">
                  {{ row.count > 1 ? row.count + '条合计' : '单条' }}
                </span>
              </template>
            </el-table-column>
            <el-table-column prop="date" label="日期" min-width="110"></el-table-column>
            <el-table-column label="利率" width="90">
              <template #default="{ row }">
                <span class="num-rate">{{ fmtRate(rowRate(row)) }}</span>
              </template>
            </el-table-column>
            <el-table-column label="本金" min-width="110" align="right">
              <template #default="{ row }">
                <span class="num-principal">{{ fmt(row.principal) }}</span>
              </template>
            </el-table-column>
            <el-table-column label="利息" min-width="110" align="right">
              <template #default="{ row }">
                <span class="num-interest">{{ fmt(row.interest) }}</span>
              </template>
            </el-table-column>
            <el-table-column label="罚息" min-width="100" align="right">
              <template #default="{ row }">
                <span class="num-penalty">{{ fmt(row.penalty) }}</span>
              </template>
            </el-table-column>
            <el-table-column label="合计" min-width="120" align="right">
              <template #default="{ row }">
                <span class="num-total">{{ fmt(row.total) }}</span>
              </template>
            </el-table-column>
            <el-table-column label="操作" width="140" fixed="right">
              <template #default="{ row }">
                <template v-if="row.count === 1 && canEditItem(row.items[0])">
                  <el-button link type="primary" @click="openEditDialog(row.items[0])">编辑</el-button>
                  <el-button link type="danger" @click="deleteItem(row.items[0])">删除</el-button>
                </template>
                <span v-else-if="row.count > 1 && hasEditableInPeriod(row)" class="op-muted">展开后编辑</span>
                <span v-else class="op-muted">—</span>
              </template>
            </el-table-column>
          </el-table>
        </div>

        <!-- 移动端卡片：可视宽度 < 640 -->
        <div v-else class="mobile-list">
          <article
            v-for="row in tableList"
            :key="row.period"
            class="period-card"
            :class="{ merged: row.count > 1, added: isAddedPeriod(row) }"
          >
            <div class="period-card-head">
              <div class="period-card-title">
                <strong>第{{ row.period }}期</strong>
                <span class="badge" :class="{ single: row.count <= 1 }">
                  {{ row.count > 1 ? row.count + '条合计' : '单条' }}
                </span>
                <span v-if="isAddedPeriod(row)" class="badge added">新增</span>
              </div>
              <div class="period-card-meta">
                <span>{{ row.date }}</span>
                <span class="num-rate">{{ fmtRate(rowRate(row)) }}</span>
              </div>
            </div>

            <div class="period-card-amounts">
              <div class="amt">
                <span class="k">本金</span>
                <span class="v num-principal">{{ fmt(row.principal) }}</span>
              </div>
              <div class="amt">
                <span class="k">利息</span>
                <span class="v num-interest">{{ fmt(row.interest) }}</span>
              </div>
              <div class="amt">
                <span class="k">罚息</span>
                <span class="v num-penalty">{{ fmt(row.penalty) }}</span>
              </div>
              <div class="amt total">
                <span class="k">合计</span>
                <span class="v num-total">{{ fmt(row.total) }}</span>
              </div>
            </div>

            <div
              v-if="(row.count === 1 && canEditItem(row.items[0])) || row.count > 1"
              class="period-card-actions"
            >
              <template v-if="row.count === 1 && canEditItem(row.items[0])">
                <el-button size="small" type="primary" plain @click="openEditDialog(row.items[0])">编辑</el-button>
                <el-button size="small" type="danger" plain @click="deleteItem(row.items[0])">删除</el-button>
              </template>
              <button
                v-if="row.count > 1"
                type="button"
                class="expand-btn"
                @click="toggleMobileExpand(row.period)"
              >
                {{ isMobileExpanded(row.period) ? '收起明细' : '展开 ' + row.count + ' 条明细' }}
              </button>
            </div>

            <div v-if="row.count > 1 && isMobileExpanded(row.period)" class="period-card-details">
              <div
                v-for="(item, idx) in row.items"
                :key="idx"
                class="detail-card"
              >
                <div class="detail-card-head">
                  <span>明细 {{ idx + 1 }}/{{ row.count }}</span>
                  <span>{{ item.date }}</span>
                  <span class="num-rate">{{ fmtRate(rowRate(item)) }}</span>
                </div>
                <div class="period-card-amounts compact">
                  <div class="amt">
                    <span class="k">本金</span>
                    <span class="v num-principal">{{ fmt(item.principal) }}</span>
                  </div>
                  <div class="amt">
                    <span class="k">利息</span>
                    <span class="v num-interest">{{ fmt(item.interest) }}</span>
                  </div>
                  <div class="amt">
                    <span class="k">罚息</span>
                    <span class="v num-penalty">{{ fmt(item.penalty) }}</span>
                  </div>
                  <div class="amt total">
                    <span class="k">合计</span>
                    <span class="v num-total">{{ fmt(item.total) }}</span>
                  </div>
                </div>
                <div v-if="canEditItem(item)" class="period-card-actions">
                  <el-button size="small" type="primary" plain @click="openEditDialog(item)">编辑</el-button>
                  <el-button size="small" type="danger" plain @click="deleteItem(item)">删除</el-button>
                </div>
              </div>
            </div>
          </article>
        </div>
      </section>

      <el-dialog
        v-model="addVisible"
        :title="editingIndex == null ? '添加数据' : '编辑数据'"
        :width="dialogWidth"
        destroy-on-close
        @closed="resetAddForm"
      >
        <el-form
          ref="addFormRef"
          class="add-form"
          :model="addForm"
          :rules="addRules"
          :label-width="isMobile ? 'auto' : '88px'"
          :label-position="isMobile ? 'top' : 'right'"
        >
          <el-form-item label="期数" prop="period">
            <el-input-number
              v-model="addForm.period"
              :min="1"
              :step="1"
              controls-position="right"
              style="width: 100%"
            />
          </el-form-item>
          <el-form-item label="还款日期" prop="date">
            <el-date-picker
              v-model="addForm.date"
              type="date"
              placeholder="选择日期"
              format="YYYY/MM/DD"
              value-format="YYYY/MM/DD"
              style="width: 100%"
            />
          </el-form-item>
          <el-form-item v-if="editingIndex == null" label="利率">
            <el-checkbox v-model="addForm.keepRate" @change="onKeepRateChange">
              沿用之前利率（{{ fmtRate(lastRatePreview) }}）
            </el-checkbox>
          </el-form-item>
          <el-form-item
            v-if="editingIndex != null || !addForm.keepRate"
            label="利率(%)"
            prop="rate"
          >
            <el-input-number
              v-model="addForm.rate"
              :min="0"
              :precision="2"
              :step="0.05"
              controls-position="right"
              style="width: 100%"
            />
          </el-form-item>
          <el-form-item label="本金" prop="principal">
            <el-input-number
              v-model="addForm.principal"
              :min="0"
              :precision="2"
              :step="100"
              controls-position="right"
              style="width: 100%"
            />
          </el-form-item>
          <el-form-item label="利息" prop="interest">
            <el-input-number
              v-model="addForm.interest"
              :min="0"
              :precision="2"
              :step="10"
              controls-position="right"
              style="width: 100%"
            />
          </el-form-item>
          <el-form-item label="罚息" prop="penalty">
            <el-input-number
              v-model="addForm.penalty"
              :min="0"
              :precision="2"
              :step="10"
              controls-position="right"
              style="width: 100%"
            />
          </el-form-item>
          <el-form-item label="合计">
            <span class="form-total">{{ fmt(addFormTotal) }}</span>
          </el-form-item>
        </el-form>
        <template #footer>
          <el-button @click="addVisible = false">取消</el-button>
          <el-button type="primary" :loading="adding" @click="submitAdd">
            {{ editingIndex == null ? '确定添加' : '保存修改' }}
          </el-button>
        </template>
      </el-dialog>
      <el-dialog
        v-model="scheduleVisible"
        title="待还款明细"
        :width="scheduleDialogWidth"
        destroy-on-close
      >
        <div class="schedule-summary">
          <span>利率 <strong>{{ forecast.rate }}%</strong></span>
          <span>剩余本金 <strong>{{ fmt(remainPrincipal) }}</strong></span>
          <span>剩余期数 <strong>{{ forecast.periods }}</strong></span>
          <span>预计利息 <strong>{{ fmt(forecast.interest) }}</strong></span>
          <span>预计合计 <strong>{{ fmt(forecast.total) }}</strong></span>
        </div>
        <div class="schedule-table-wrap">
        <el-table :data="scheduleRows" :height="scheduleTableHeight" stripe border size="small">
          <el-table-column prop="seq" label="序" width="64" align="center"></el-table-column>
          <el-table-column prop="period" label="期数" width="88">
            <template #default="{ row }">第{{ row.period }}期</template>
          </el-table-column>
          <el-table-column prop="date" label="预计日期" min-width="110"></el-table-column>
          <el-table-column label="利率" width="80">
            <template #default="{ row }">{{ fmtRate(row.rate) }}</template>
          </el-table-column>
          <el-table-column label="本金" min-width="110" align="right">
            <template #default="{ row }">
              <span class="num-principal">{{ fmt(row.principal) }}</span>
            </template>
          </el-table-column>
          <el-table-column label="利息" min-width="110" align="right">
            <template #default="{ row }">
              <span class="num-interest">{{ fmt(row.interest) }}</span>
            </template>
          </el-table-column>
          <el-table-column label="合计" min-width="110" align="right">
            <template #default="{ row }">
              <span class="num-total">{{ fmt(row.total) }}</span>
            </template>
          </el-table-column>
          <el-table-column label="剩余本金" min-width="120" align="right">
            <template #default="{ row }">{{ fmt(row.balance) }}</template>
          </el-table-column>
        </el-table>
        </div>
        <template #footer>
          <el-button @click="scheduleVisible = false">关闭</el-button>
        </template>
      </el-dialog>

      <el-dialog
        v-model="jsonVisible"
        :title="jsonTitle"
        :width="jsonDialogWidth"
        destroy-on-close
      >
        <div class="json-toolbar">
          <el-button type="primary" @click="copyJson">复制</el-button>
        </div>
        <el-input
          v-model="jsonText"
          class="json-preview"
          type="textarea"
          :rows="18"
          readonly
        />
        <template #footer>
          <el-button @click="jsonVisible = false">关闭</el-button>
        </template>
      </el-dialog>
    </template>
  </div>

  <script>
    const { createApp, ref, computed, reactive, onMounted, nextTick, onBeforeUnmount } = Vue;
    const { ElMessage, ElMessageBox } = ElementPlus;

    /** 公积金贷款利率档期 */
    const RATE_SCHEDULE = [
      {
        from: '2022/05/01',
        to: '2022/12/31',
        rate: 3.25,
        label: '2022年5月（放贷时）至 2022年12月31日',
      },
      {
        from: '2023/01/01',
        to: '2024/12/31',
        rate: 3.1,
        label: '2023年1月1日 至 2024年12月31日',
      },
      {
        from: '2025/01/01',
        to: '2025/12/31',
        rate: 2.85,
        label: '2025年1月1日 至 2025年12月31日',
      },
      {
        from: '2026/01/01',
        to: null,
        rate: 2.6,
        label: '2026年1月1日起',
      },
    ];

    function parseDateKey(s) {
      const m = String(s).match(/(\d{4})\D(\d{1,2})\D(\d{1,2})/);
      if (!m) return '';
      return `${m[1]}${String(m[2]).padStart(2, '0')}${String(m[3]).padStart(2, '0')}`;
    }

    function rateByDate(dateStr) {
      const key = parseDateKey(dateStr);
      if (!key) return RATE_SCHEDULE[RATE_SCHEDULE.length - 1].rate;
      for (const item of RATE_SCHEDULE) {
        const from = parseDateKey(item.from);
        const to = item.to ? parseDateKey(item.to) : '99991231';
        if (key >= from && key <= to) return item.rate;
      }
      if (key < parseDateKey(RATE_SCHEDULE[0].from)) return RATE_SCHEDULE[0].rate;
      return RATE_SCHEDULE[RATE_SCHEDULE.length - 1].rate;
    }

    function rateByYear(year) {
      return rateByDate(`${year}/06/15`);
    }

    function fmtRate(rate) {
      return `${Number(rate).toFixed(2)}%`;
    }

    /** 原贷本金（元） */
    const LOAN_PRINCIPAL = 700000;
    /** 测算到期日 */
    const FORECAST_MATURITY = '2040/02/18';

    function parseYearMonth(dateStr) {
      const m = String(dateStr).match(/(\d{4})\D(\d{1,2})/);
      if (!m) return null;
      return { year: Number(m[1]), month: Number(m[2]) };
    }

    /** 从最近一期的下一月到到期月（含）的期数 */
    function remainingPeriods(lastDate, maturity) {
      const start = parseYearMonth(lastDate);
      const end = parseYearMonth(maturity);
      if (!start || !end) return 0;
      let y = start.year;
      let m = start.month + 1;
      if (m > 12) {
        m = 1;
        y += 1;
      }
      return Math.max(0, (end.year - y) * 12 + (end.month - m) + 1);
    }

    /** 等额本金：剩余本金 + 全程固定年利率下的利息合计 */
    function calcEqualPrincipalForecast(principal, annualRatePercent, periods) {
      if (principal <= 0 || periods <= 0) {
        return {
          periods: 0,
          monthlyPrincipal: 0,
          interest: 0,
          total: 0,
        };
      }
      const r = annualRatePercent / 100 / 12;
      const monthlyPrincipal = principal / periods;
      let balance = principal;
      let interest = 0;
      for (let k = 1; k <= periods; k++) {
        interest += balance * r;
        balance -= k === periods ? balance : monthlyPrincipal;
      }
      return {
        periods,
        monthlyPrincipal,
        interest,
        total: principal + interest,
      };
    }

    function addMonths(year, month, day, offset) {
      const d = new Date(year, month - 1 + offset, 1);
      const y = d.getFullYear();
      const m = d.getMonth() + 1;
      const lastDay = new Date(y, m, 0).getDate();
      const dd = Math.min(day, lastDay);
      return `${y}/${String(m).padStart(2, '0')}/${String(dd).padStart(2, '0')}`;
    }

    /** 生成等额本金待还款明细 */
    function buildRepaymentSchedule({
      principal,
      annualRatePercent,
      periods,
      lastDate,
      startPeriod,
    }) {
      if (principal <= 0 || periods <= 0) return [];
      const parsed = String(lastDate).match(/(\d{4})\D(\d{1,2})\D(\d{1,2})/);
      const year = parsed ? Number(parsed[1]) : new Date().getFullYear();
      const month = parsed ? Number(parsed[2]) : new Date().getMonth() + 1;
      const day = parsed ? Number(parsed[3]) : 20;
      const r = annualRatePercent / 100 / 12;
      const monthlyPrincipal = principal / periods;
      let balance = principal;
      const rows = [];
      for (let k = 1; k <= periods; k++) {
        const interest = balance * r;
        const p = k === periods ? balance : monthlyPrincipal;
        balance = Math.max(0, balance - p);
        rows.push({
          seq: k,
          period: startPeriod + k - 1,
          date: addMonths(year, month, day, k),
          rate: annualRatePercent,
          principal: p,
          interest,
          total: p + interest,
          balance,
        });
      }
      return rows;
    }

    const app = createApp({
      setup() {

        const configHint = ref('');
        const cloudProvider = ref(''); // 'supabase' | 'jsonbin' | ''

        const scheduleDialogWidth = computed(() =>

        const jsonDialogWidth = computed(() =>

        function chartLayout() {

              : { top: 0 },
            axisFont: narrow ? 10 : 11,
            barMax: narrow ? 18 : 28,
            yearBarMax: narrow ? 36 : 56,

              : { formatter: '{b}\n{d}%' },
          };
        }

        /** 兼容旧字段 index/date 与新字段 row_index/pay_date；rate 可为 null */
        function normalizeRow(row) {
          if (!row || typeof row !== 'object') return null;
          const index = row.index != null ? row.index : row.row_index;
          const date = row.date != null ? row.date : row.pay_date;
          if (index == null || date == null || row.period == null) return null;
          const item = {
            index: Number(index),
            period: Number(row.period),
            date: String(date),
            total: Number(row.total) || 0,
            principal: Number(row.principal) || 0,
            interest: Number(row.interest) || 0,
            penalty: Number(row.penalty) || 0,
          };
          if (row.rate != null && row.rate !== '') item.rate = Number(row.rate);
          return item;
        }

        function normalizeRows(rows) {
          return (Array.isArray(rows) ? rows : [])
            .map(normalizeRow)
            .filter(Boolean);
        }

        /** 同一期多条记录合并为一条（本金/利息/罚息/总额相加），并保留明细 */
        function mergeByPeriod(rows) {
          const map = new Map();
          for (const row of normalizeRows(rows)) {
            const key = row.period;
            if (!map.has(key)) {
              map.set(key, {
                period: row.period,
                date: row.date,
                rate: row.rate,
                total: 0,
                principal: 0,
                interest: 0,
                penalty: 0,
                count: 0,
                items: [],
              });
            }
            const item = map.get(key);
            item.total += row.total;
            item.principal += row.principal;
            item.interest += row.interest;
            item.penalty += row.penalty;
            item.count += 1;
            item.items.push({ ...row });
            if (row.date > item.date) {
              item.date = row.date;
              if (row.rate != null) item.rate = row.rate;
            }
            if (item.rate == null && row.rate != null) item.rate = row.rate;
          }
          return Array.from(map.values()).sort((a, b) => a.period - b.period);
        }

        /** 按还款日期年份汇总 */
        function groupByYear(rows) {
          const map = new Map();
          for (const row of rows) {
            const year = String(row.date).slice(0, 4);
            if (!map.has(year)) {
              map.set(year, {
                year,
                total: 0,
                principal: 0,
                interest: 0,
                penalty: 0,
                count: 0,
              });
            }
            const item = map.get(year);
            item.total += row.total;
            item.principal += row.principal;
            item.interest += row.interest;
            item.penalty += row.penalty;
            item.count += 1;
          }
          return Array.from(map.values()).sort((a, b) => a.year.localeCompare(b.year));
        }

        function tableRowClass({ row }) {
          return row.count > 1 ? 'row-merged' : 'row-single';
        }

        const sum = computed(() => {
          const s = { total: 0, principal: 0, interest: 0, penalty: 0 };
          for (const row of list.value) {
            s.total += row.total;
            s.principal += row.principal;
            s.interest += row.interest;
            s.penalty += row.penalty;
          }
          return s;
        });

        const remainPrincipal = computed(() =>
          Math.max(0, loanPrincipal - sum.value.principal)
        );

        const loanProgress = computed(() => {
          if (!loanPrincipal) return '0.00';
          return ((sum.value.principal / loanPrincipal) * 100).toFixed(2);
        });

        const paidStats = computed(() => {
          const s = sum.value;
          const total = s.total || 0;
          const pct = (n) => (total > 0 ? ((n / total) * 100).toFixed(1) : '0.0');
          const periods = list.value.length;
          const records = list.value.reduce((n, row) => n + (row.count || 1), 0);
          const first = list.value[0];
          const last = list.value[list.value.length - 1];
          const firstDate = first?.date || '—';
          const lastDate = last?.date || '—';

          let spanText = '—';
          const a = parseYearMonth(firstDate);
          const b = parseYearMonth(lastDate);
          if (a && b) {
            const months = Math.max(0, (b.year - a.year) * 12 + (b.month - a.month));
            const years = Math.floor(months / 12);
            const rem = months % 12;
            if (years > 0 && rem > 0) spanText = `${years}年${rem}个月`;
            else if (years > 0) spanText = `${years}年`;
            else spanText = `${Math.max(months, 1)}个月`;
          }

          return {
            periods,
            records,
            avgTotal: periods ? total / periods : 0,
            principalPct: pct(s.principal),
            interestPct: pct(s.interest),
            penaltyPct: pct(s.penalty),
            spanText,
            rangeText: `${firstDate} 至 ${lastDate}`,
          };
        });

        const forecast = computed(() => {
          const rate = lastRate();
          const lastDate = list.value.length
            ? list.value[list.value.length - 1].date
            : todayStr();
          const periods = remainingPeriods(lastDate, FORECAST_MATURITY);
          const calc = calcEqualPrincipalForecast(
            remainPrincipal.value,
            rate,
            periods
          );
          return {
            rate,
            maturity: FORECAST_MATURITY,
            lastDate,
            ...calc,
          };
        });

        const scheduleRows = computed(() => {
          const f = forecast.value;
          if (!f.periods) return [];
          const startPeriod = list.value.length
            ? Math.max(...list.value.map((d) => d.period)) + 1
            : 1;
          return buildRepaymentSchedule({
            principal: remainPrincipal.value,
            annualRatePercent: f.rate,
            periods: f.periods,
            lastDate: f.lastDate,
            startPeriod,
          });
        });

        function openScheduleDialog() {
          if (!forecast.value.periods) {
            ElMessage.warning('当前没有待还款期数');
            return;
          }
          scheduleVisible.value = true;
        }

        const tableList = computed(() =>
          [...list.value].sort((a, b) => b.period - a.period)
        );

        const addFormTotal = computed(() =>
          (Number(addForm.principal) || 0) +
          (Number(addForm.interest) || 0) +
          (Number(addForm.penalty) || 0)
        );

        const fmt = (n) =>
          n.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

        function todayStr() {
          const d = new Date();
          const y = d.getFullYear();
          const m = String(d.getMonth() + 1).padStart(2, '0');
          const day = String(d.getDate()).padStart(2, '0');
          return `${y}/${m}/${day}`;
        }

        function nextPeriod() {
          if (!list.value.length) return 1;
          return Math.max(...list.value.map((d) => d.period)) + 1;
        }

        function nextIndex() {
          const raw = list.value.flatMap((d) => d.items || [d]);
          if (!raw.length) return 1;
          return Math.max(...raw.map((d) => d.index || 0)) + 1;
        }

        /** 上一次利率：优先本次新增最后一条，否则取数据中最新一期 */
        function lastRate() {
          if (addedRows.value.length) {
            const last = addedRows.value[addedRows.value.length - 1];
            if (last.rate != null) return Number(last.rate);
          }
          const raw = list.value.flatMap((d) => d.items || [d]);
          if (raw.length) {
            const latest = [...raw].sort((a, b) => (b.index || 0) - (a.index || 0))[0];
            if (latest.rate != null) return Number(latest.rate);
            return rateByDate(latest.date);
          }
          return rateByDate(todayStr());
        }

        const lastRatePreview = computed(() => lastRate());

        function rowRate(row) {
          if (row && row.rate != null && row.rate !== '') return Number(row.rate);
          return rateByDate(row?.date);
        }

        function onKeepRateChange(checked) {
          if (!checked) {
            addForm.rate = lastRate();
          }
        }

        function isAddedItem(item) {
          return !!item && addedRows.value.some((r) => r.index === item.index);
        }

        /** 云端模式下全部可改；本地模式仅本次新增可改 */
        function canEditItem(item) {
          if (useCloud.value) return !!item;
          return isAddedItem(item);
        }

        function hasAddedInPeriod(row) {
          return (row.items || []).some((item) => isAddedItem(item));
        }

        function hasEditableInPeriod(row) {
          return (row.items || []).some((item) => canEditItem(item));
        }

        function isAddedPeriod(row) {
          if (useCloud.value) return false;
          const items = row.items || [];
          return items.length > 0 && items.every((item) => isAddedItem(item));
        }

        function rebuildList(raw) {
          list.value = mergeByPeriod(raw);
        }

        async function persistCloud(action, payload) {
          if (!useCloud.value) return;
          saving.value = true;
          try {
            if (cloudProvider.value === 'supabase' && window.GjjSupabase) {
              if (action === 'insert') await window.GjjSupabase.insert(payload);
              else if (action === 'update') await window.GjjSupabase.update(payload);
              else if (action === 'delete') await window.GjjSupabase.remove(payload);
              else await window.GjjSupabase.saveAll(getAllAppRows());
            } else if (cloudProvider.value === 'jsonbin' && window.GjjJsonBin) {
              await window.GjjJsonBin.save(getAllRawRows());
            }
          } finally {
            saving.value = false;
          }
        }

        async function saveToCloud() {
          if (!useCloud.value) return;
          try {
            await persistCloud('saveAll');
            ElMessage.success(
              cloudProvider.value === 'supabase'
                ? '已整表保存到 Supabase'
                : '已保存到 JSONBin'
            );
          } catch (e) {
            ElMessage.error(e.message || '保存失败');
          }
        }

        function openAddDialog() {
          editingIndex.value = null;
          addForm.period = nextPeriod();
          addForm.date = todayStr();
          addForm.keepRate = true;
          addForm.rate = lastRate();
          addForm.principal = 0;
          addForm.interest = 0;
          addForm.penalty = 0;
          addVisible.value = true;
        }

        function openEditDialog(item) {
          editingIndex.value = item.index;
          addForm.period = item.period;
          addForm.date = item.date;
          addForm.keepRate = false;
          addForm.rate = rowRate(item);
          addForm.principal = item.principal;
          addForm.interest = item.interest;
          addForm.penalty = item.penalty;
          addVisible.value = true;
        }

        function resetAddForm() {
          editingIndex.value = null;
          addFormRef.value?.resetFields?.();
        }

        async function deleteItem(item) {
          if (!canEditItem(item)) return;
          try {
            await ElMessageBox.confirm(
              `确定删除第 ${item.period} 期（${item.date}）这条数据吗？`,
              '删除确认',
              { type: 'warning', confirmButtonText: '删除', cancelButtonText: '取消' }
            );
          } catch {
            return;
          }

          const raw = list.value
            .flatMap((d) => d.items || [d])
            .filter((d) => d.index !== item.index);
          rebuildList(raw);
          addedRows.value = addedRows.value.filter((d) => d.index !== item.index);
          try {
            await persistCloud('delete', item.index);
            await nextTick();
            refreshCharts();
            ElMessage.success(useCloud.value ? '已删除并同步到云端' : '已删除');
          } catch (e) {
            ElMessage.error(e.message || '已删除本地，但云端同步失败');
            await nextTick();
            refreshCharts();
          }
        }

        async function submitAdd() {
          const formEl = addFormRef.value;
          if (!formEl) return;
          try {
            await formEl.validate();
          } catch {
            return;
          }

          const principal = Number(addForm.principal) || 0;
          const interest = Number(addForm.interest) || 0;
          const penalty = Number(addForm.penalty) || 0;
          const isEdit = editingIndex.value != null;
          const rate = (!isEdit && addForm.keepRate)
            ? lastRate()
            : Number(addForm.rate);
          if (principal + interest + penalty <= 0) {
            ElMessage.warning('本金、利息、罚息不能全部为 0');
            return;
          }
          if ((isEdit || !addForm.keepRate) && (Number.isNaN(rate) || rate < 0)) {
            ElMessage.warning('请输入有效利率');
            return;
          }

          adding.value = true;
          try {
            const row = {
              index: isEdit ? editingIndex.value : nextIndex(),
              period: Number(addForm.period),
              date: addForm.date,
              rate,
              principal,
              interest,
              penalty,
              total: principal + interest + penalty,
            };
            const raw = list.value.flatMap((d) => d.items || [d]);
            if (isEdit) {
              const pos = raw.findIndex((d) => d.index === editingIndex.value);
              if (pos >= 0) raw[pos] = row;
              else raw.push(row);
              const addedPos = addedRows.value.findIndex((d) => d.index === editingIndex.value);
              if (addedPos >= 0) addedRows.value[addedPos] = { ...row };
              else if (!useCloud.value) addedRows.value.push({ ...row });
            } else {
              raw.push(row);
              if (!useCloud.value) addedRows.value.push({ ...row });
            }
            rebuildList(raw);
            await persistCloud(isEdit ? 'update' : 'insert', row);
            addVisible.value = false;
            await nextTick();
            refreshCharts();
            const tip = isEdit ? `已保存第 ${row.period} 期修改` : `已添加第 ${row.period} 期数据`;
            ElMessage.success(useCloud.value ? tip + '（已同步云端）' : tip);
          } catch (e) {
            ElMessage.error(e.message || '保存失败');
          } finally {
            adding.value = false;
          }
        }

        /** 导出 / 备份：与 Supabase、data.json 字段一致 */
        function toRawRows(rows) {
          return rows
            .map((d) => {
              const n = normalizeRow(d);
              if (!n) return null;
              return {
                row_index: n.index,
                period: n.period,
                pay_date: n.date,
                total: n.total,
                principal: n.principal,
                interest: n.interest,
                penalty: n.penalty,
                rate: n.rate != null ? n.rate : null,
              };
            })
            .filter(Boolean)
            .sort((a, b) => (b.row_index || 0) - (a.row_index || 0));
        }

        /** 云端写入用的应用内格式 */
        function getAllAppRows() {
          return normalizeRows(list.value.flatMap((d) => d.items || [d]))
            .sort((a, b) => (b.index || 0) - (a.index || 0));
        }

        function getAllRawRows() {
          return toRawRows(list.value.flatMap((d) => d.items || [d]));
        }

        function showJson(title, rows, { wrapArray = true } = {}) {
          const text = wrapArray
            ? JSON.stringify(rows, null, 2)
            : rows.map((r) => JSON.stringify(r, null, 2)).join(',\n');
          jsonTitle.value = title;
          jsonText.value = text;
          jsonVisible.value = true;
          console.log(title, rows);
          console.log(text);
        }

        function printAllData() {
          showJson(
            useCloud.value ? '全部数据（云端备份）' : '全部数据（可替换 data.json）',
            getAllRawRows()
          );
        }

        function printAddedData() {
          if (!addedRows.value.length) {
            ElMessage.warning('本次还没有新增数据');
            return;
          }
          showJson('本次新增数据（可追加到 data.json）', toRawRows(addedRows.value), {

        async function maybeImportLocalToSupabase() {
          try {
            await ElMessageBox.confirm(
              'Supabase 表里还没有数据。是否把本地 assets/data.json 导入？',
              '导入数据',
              { confirmButtonText: '导入', cancelButtonText: '暂不', type: 'info' }
            );
          } catch {
            return [];
          }
          const res = await fetch('./assets/data.json');
          if (!res.ok) throw new Error('无法读取本地 data.json');
          const raw = await res.json();
          if (!Array.isArray(raw) || !raw.length) throw new Error('本地 data.json 为空');
          await window.GjjSupabase.saveAll(raw);
          ElMessage.success(`已导入 ${raw.length} 条到 Supabase`);
          return raw;
        }

        async function loadInitialData() {
          configHint.value = '';
          cloudProvider.value = '';

          if (window.GjjSupabase && window.GjjSupabase.isConfigured()) {
            cloudProvider.value = 'supabase';
            let raw = await window.GjjSupabase.load();
            if (!raw.length) {
              raw = await maybeImportLocalToSupabase();
            }
            list.value = mergeByPeriod(raw);
            return;
          }

          if (window.GjjJsonBin && window.GjjJsonBin.isConfigured()) {
            cloudProvider.value = 'jsonbin';
            const raw = await window.GjjJsonBin.load();
            list.value = mergeByPeriod(raw);
            return;
          }

          const res = await fetch('./assets/data.json');
          if (!res.ok) throw new Error('无法加载 data.json');
          const raw = await res.json();
          list.value = mergeByPeriod(raw);
        }

        async function copyJson() {
          try {
            await navigator.clipboard.writeText(jsonText.value);
            ElMessage.success('已复制到剪贴板');
          } catch {
            ElMessage.error('复制失败，请手动选中复制');
          }
        }

        const axisLabel = (data) =>
          data.map((d) => `第${d.period}期`);

        function disposeCharts() {
          while (charts.length) {
            const c = charts.pop();
            c.dispose();
          }
          stackInstance = null;
        }

        function refreshCharts() {
          disposeCharts();
          initCharts();
        }

        /** 将每期还款合计图缩放到指定年份 */
        function focusStackToYear(year) {
          if (!stackInstance) return;
          const data = list.value;
          const n = data.length;
          if (!n) return;

          const yearStr = String(year);
          const indices = [];
          data.forEach((d, i) => {
            if (String(d.date).slice(0, 4) === yearStr) indices.push(i);
          });
          if (!indices.length) {
            ElMessage.warning(`${yearStr} 年没有对应期数`);
            return;
          }

          const first = indices[0];
          const last = indices[indices.length - 1];
          let start = (first / n) * 100;
          let end = ((last + 1) / n) * 100;
          if (end - start < 8) {
            const mid = (start + end) / 2;
            start = Math.max(0, mid - 4);
            end = Math.min(100, mid + 4);
          }

          stackInstance.dispatchAction({
            type: 'dataZoom',
            start,
            end,
          });
          stackChart.value?.scrollIntoView({ behavior: 'smooth', block: 'center' });
          ElMessage.success(`已定位到 ${yearStr} 年（第${data[first].period}–${data[last].period}期）`);
        }

        function initCharts() {
          const data = list.value;
          const labels = axisLabel(data);
          const layout = chartLayout();
          const colors = {
            principal: '#2b6cb0',
            interest: '#c05621',
            penalty: '#9b2c2c',
            total: '#0d7a6f',
            rate: '#6b46c1',
          };
          const rateAxis = {
            type: 'value',
            name: layout.narrow ? '' : '利率%',
            min: 2.4,
            max: 3.4,
            splitNumber: layout.narrow ? 4 : 5,
            axisLabel: {
              formatter: '{value}%',
              color: colors.rate,
              fontSize: layout.axisFont,
            },
            nameTextStyle: { color: colors.rate },
            splitLine: { show: false },
          };
          const rateSeries = (rates) => ({
            name: '利率',
            type: 'line',
            yAxisIndex: 1,
            step: 'end',
            symbol: 'circle',
            symbolSize: layout.narrow ? 5 : 7,
            z: 10,
            lineStyle: { width: layout.narrow ? 1.8 : 2.2, color: colors.rate },
            itemStyle: { color: colors.rate },
            data: rates,
          });
          const rateLegend = {
            ...layout.legend,
            selected: { 利率: false },
          };

          const stack = echarts.init(stackChart.value);
          stackInstance = stack;
          const periodRows = data.map((d) => ({
            principal: d.principal,
            interest: d.interest,
            penalty: d.penalty,
            total: d.principal + d.interest + d.penalty,
            rate: rowRate(d),
            date: d.date,
          }));
          stack.setOption({
            color: [colors.principal, colors.interest, colors.penalty, colors.rate],
            tooltip: {
              trigger: 'axis',
              axisPointer: { type: 'cross' },
              confine: true,
              formatter(params) {
                const i = params[0].dataIndex;
                const row = periodRows[i];
                let html = `${params[0].axisValue}（${row.date}）<br/>`;
                for (const p of params) {
                  if (p.seriesName === '利率') {
                    html += `${p.marker}${p.seriesName}：${fmtRate(p.value)}<br/>`;
                  } else {
                    const v = Number(p.value) || 0;
                    html += `${p.marker}${p.seriesName}：${v.toFixed(2)}<br/>`;
                  }
                }
                html += `<b>合计：${row.total.toFixed(2)}</b>`;
                return html;
              },
            },
            legend: { ...rateLegend, data: ['本金', '利息', '罚息', '利率'] },
            grid: layout.grid,
            dataZoom: [
              { type: 'inside', start: 0, end: 100 },
              { type: 'slider', height: layout.sliderHeight, bottom: 8 },
            ],
            xAxis: {
              type: 'category',
              data: labels,
              axisLabel: { rotate: 40, fontSize: layout.axisFont },
            },
            yAxis: [
              {
                type: 'value',
                name: layout.narrow ? '' : '金额',
                axisLabel: { fontSize: layout.axisFont },
                splitLine: { lineStyle: { type: 'dashed', color: '#d8e0ea' } },
              },
              rateAxis,
            ],
            series: [
              {
                name: '本金',
                type: 'bar',
                stack: 'total',
                barMaxWidth: layout.barMax,
                itemStyle: { color: colors.principal },
                data: periodRows.map((d) => d.principal),
              },
              {
                name: '利息',
                type: 'bar',
                stack: 'total',
                barMaxWidth: layout.barMax,
                itemStyle: { color: colors.interest },
                data: periodRows.map((d) => d.interest),
              },
              {
                name: '罚息',
                type: 'bar',
                stack: 'total',
                barMaxWidth: layout.barMax,
                itemStyle: {
                  color: colors.penalty,
                  borderRadius: [4, 4, 0, 0],
                },
                data: periodRows.map((d) => d.penalty),
              },
              rateSeries(periodRows.map((d) => d.rate)),
            ],
          });
          charts.push(stack);

          const yearData = groupByYear(
            data.flatMap((d) => d.items || [d])
          ).map((d) => ({ ...d, rate: rateByYear(d.year) }));
          const year = echarts.init(yearChart.value);
          year.setOption({
            color: [colors.principal, colors.interest, colors.penalty, colors.rate],
            tooltip: {
              trigger: 'axis',
              axisPointer: { type: 'cross' },
              confine: true,
              formatter(params) {
                let html = `${params[0].axisValue}年<br/>`;
                let total = 0;
                for (const p of params) {
                  if (p.seriesName === '利率') {
                    html += `${p.marker}${p.seriesName}：${fmtRate(p.value)}<br/>`;
                  } else {
                    const v = Number(p.value) || 0;
                    total += v;
                    html += `${p.marker}${p.seriesName}：${v.toFixed(2)}<br/>`;
                  }
                }
                const row = yearData[params[0].dataIndex];
                html += `明细条数：${row.count}<br/>`;
                html += `<b>合计：${total.toFixed(2)}</b>`;
                html += '<br/><span style="color:#6b46c1">点击定位到每期还款合计</span>';
                return html;
              },
            },
            legend: { ...rateLegend, data: ['本金', '利息', '罚息', '利率'] },
            grid: layout.yearGrid,
            xAxis: {
              type: 'category',
              data: yearData.map((d) => d.year),
              triggerEvent: true,
              axisLabel: {
                fontSize: layout.narrow ? 11 : 13,
                color: '#2b6cb0',
                fontWeight: 600,
              },
            },
            yAxis: [
              {
                type: 'value',
                name: layout.narrow ? '' : '金额',
                axisLabel: { fontSize: layout.axisFont },
                splitLine: { lineStyle: { type: 'dashed', color: '#d8e0ea' } },
              },
              rateAxis,
            ],
            series: [
              {
                name: '本金',
                type: 'bar',
                stack: 'year',
                barMaxWidth: layout.yearBarMax,
                cursor: 'pointer',
                data: yearData.map((d) => Number(d.principal.toFixed(2))),
              },
              {
                name: '利息',
                type: 'bar',
                stack: 'year',
                barMaxWidth: layout.yearBarMax,
                cursor: 'pointer',
                data: yearData.map((d) => Number(d.interest.toFixed(2))),
              },
              {
                name: '罚息',
                type: 'bar',
                stack: 'year',
                barMaxWidth: layout.yearBarMax,
                cursor: 'pointer',
                data: yearData.map((d) => Number(d.penalty.toFixed(2))),
                label: {
                  show: true,
                  position: 'top',
                  color: '#5a6a7e',
                  fontSize: layout.narrow ? 10 : 11,
                  formatter: (p) => yearData[p.dataIndex].total.toFixed(0),
                },
              },
              rateSeries(yearData.map((d) => d.rate)),
            ],
          });
          year.on('click', (params) => {
            let yearStr = null;
            if (params.componentType === 'series' && params.seriesName !== '利率') {
              yearStr = yearData[params.dataIndex]?.year;
            } else if (params.componentType === 'xAxis') {
              yearStr = params.value;
            }
            if (yearStr) focusStackToYear(yearStr);
          });
          charts.push(year);

          const line = echarts.init(lineChart.value);
          line.setOption(
            GjjCharts.buildLineChartOption({
              data,
              labels,
              colors,
              rateAxis,
              rateSeries,
              rateLegend,
              fmtRate,
              getRate: rowRate,
              grid: layout.lineGrid,
              axisFont: layout.axisFont,
              confine: true,
            })
          );
          charts.push(line);

          const pie = echarts.init(pieChart.value);
          const s = sum.value;
          pie.setOption({
            color: [colors.principal, colors.interest, colors.penalty],
            tooltip: {
              trigger: 'item',
              confine: true,
              formatter: ({ name, value, percent }) =>
                `${name}<br/>${value.toFixed(2)}（${percent}%）`,
            },
            legend: { bottom: 0, textStyle: { fontSize: layout.axisFont } },
            series: [
              {
                type: 'pie',
                radius: layout.pieRadius,
                center: ['50%', '46%'],
                avoidLabelOverlap: true,
                itemStyle: { borderRadius: 6, borderColor: '#fff', borderWidth: 2 },
                label: layout.pieLabel,
                data: [
                  { name: '本金', value: s.principal },
                  { name: '利息', value: s.interest },
                  { name: '罚息', value: s.penalty },
                ].filter((d) => d.value > 0),
              },
            ],
          });
          charts.push(pie);
        }

        let lastNarrow = window.innerWidth < 640;

        function onResize() {
          syncViewport();
          const narrow = window.innerWidth < 640;
          if (narrow !== lastNarrow && charts.length) {
            lastNarrow = narrow;
            refreshCharts();
            return;
          }
          lastNarrow = narrow;
          charts.forEach((c) => c.resize());
        }

        onMounted(async () => {
          try {
            await loadInitialData();
            ready.value = true;
            await nextTick();
            initCharts();
            window.addEventListener('resize', onResize);
          } catch (e) {
            error.value = e.message || '数据加载失败';
            if (cloudProvider.value === 'supabase') {
              configHint.value =
                '请检查 config.js 的 supabase.url / anonKey，并确认已执行 supabase-setup.sql。';
            } else if (cloudProvider.value === 'jsonbin') {
              configHint.value =
                '请检查 config.js 中的 binId / masterKey，或到 JSONBin 确认 Bin 内容为数组。';
            }
          }
        });

        onBeforeUnmount(() => {
          window.removeEventListener('resize', onResize);
          disposeCharts();
        });

        return {
          list,
          tableList,
          ready,
          error,
          configHint,
          useCloud,
          cloudProvider,
          cloudLabel,
          saving,
          saveToCloud,
          sum,
          loanPrincipal,
          remainPrincipal,
          loanProgress,
          paidStats,
          forecast,
          scheduleVisible,
          scheduleRows,
          openScheduleDialog,
          fmt,
          fmtRate,
          rateByDate,
          rowRate,
          tableRowClass,
          stackChart,
          yearChart,
          lineChart,
          pieChart,
          addVisible,
          adding,
          addFormRef,
          addForm,
          addRules,
          addFormTotal,
          editingIndex,
          lastRatePreview,
          onKeepRateChange,
          isAddedItem,
          canEditItem,
          hasAddedInPeriod,
          hasEditableInPeriod,
          isAddedPeriod,
          openAddDialog,
          openEditDialog,
          deleteItem,
          resetAddForm,
          submitAdd,
          printAllData,
          printAddedData,
          jsonVisible,
          jsonTitle,
          jsonText,
          copyJson,
          isMobile,
          dialogWidth,
          scheduleDialogWidth,
          jsonDialogWidth,
          tableHeight,
          scheduleTableHeight,
          isMobileExpanded,
          toggleMobileExpand,
        };
      },
    });

    app.use(ElementPlus, { locale: ElementPlusLocaleZhCn });
    app.mount('#app');
  </script>
</body>
</html>
